  </text>
  <text x="170" y="279" text-anchor="middle" font-size="10" fill="#374151">20 scenarios  ·  24-hour readings</text>
  <text x="170" y="294" text-anchor="middle" font-size="10" fill="#374151">PM2.5 / NO2 / O3 / SO2 / CO / CH4</text>
  <text x="170" y="309" text-anchor="middle" font-size="9"  fill="#6b7280">20 global industrial locations</text>
  <text x="170" y="320" text-anchor="middle" font-size="9"  fill="#6b7280">~48 KB</text>

  <!-- real_task2.json -->
  <rect x="340" y="240" width="280" height="86" rx="7" fill="#ffffff" stroke="#b45d00" stroke-width="1.5"/>
  <rect x="340" y="240" width="280" height="24" rx="7" fill="#fef3e8"/>
  <rect x="340" y="252" width="280" height="12" fill="#fef3e8"/>
