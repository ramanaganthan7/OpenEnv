  <text x="480" y="875" text-anchor="middle" font-size="10" fill="#374151">Inline bar charts for reading levels</text>
  <text x="480" y="890" text-anchor="middle" font-size="10" fill="#374151">Dependency graph and compliance status</text>
  <text x="480" y="908" text-anchor="middle" font-size="9" fill="#6b7280">Live episode score meter in sidebar</text>
  <text x="480" y="922" text-anchor="middle" font-size="9" fill="#6b7280">No emojis · white professional theme</text>

  <!-- inference.py -->
  <rect x="650" y="816" width="280" height="120" rx="7" fill="#ffffff" stroke="#7a3a9a" stroke-width="1.8"/>
  <rect x="650" y="816" width="280" height="26" rx="7" fill="#7a3a9a"/>
  <rect x="650" y="830" width="280" height="12" fill="#7a3a9a"/>
  <text x="790" y="833" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">
