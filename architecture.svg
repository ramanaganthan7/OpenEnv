    Evaluation Agent
  </text>
  <text x="170" y="860" text-anchor="middle" font-size="10" fill="#374151">Calls POST /reset</text>
  <text x="170" y="875" text-anchor="middle" font-size="10" fill="#374151">Calls POST /step (multiple times)</text>
  <text x="170" y="890" text-anchor="middle" font-size="10" fill="#374151">Calls POST /grader for final score</text>
  <text x="170" y="908" text-anchor="middle" font-size="9" fill="#6b7280">Frontier LLM agent (Nemotron / GPT-4)</text>
  <text x="170" y="922" text-anchor="middle" font-size="9" fill="#6b7280">Brings its own model — no setup needed</text>

  <!-- Web Dashboard -->
  <rect x="340" y="816" width="280" height="120" rx="7" fill="#ffffff" stroke="#2e9e58" stroke-width="1.8"/>
