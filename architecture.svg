  </text>

  <!-- real_task1.json -->
  <rect x="30" y="240" width="280" height="86" rx="7" fill="#ffffff" stroke="#2e9e58" stroke-width="1.5"/>
  <rect x="30" y="240" width="280" height="24" rx="7" fill="#e8f5ee"/>
  <rect x="30" y="252" width="280" height="12" fill="#e8f5ee"/>
