       LAYER 4 — FASTAPI SERVER
  ══════════════════════════════════════════════════════════ -->
  <text x="20" y="600" font-size="10" font-weight="700" fill="#6b7280" letter-spacing="1.5">LAYER 4 — FASTAPI SERVER  (port 7860 · Docker · HuggingFace Spaces)</text>
  <line x1="20" y1="604" x2="980" y2="604" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="60" y="614" width="880" height="110" rx="8" fill="#ffffff" stroke="#1565a8" stroke-width="2"/>
  <rect x="60" y="614" width="880" height="30" rx="8" fill="#1565a8"/>
  <rect x="60" y="632" width="880" height="12" fill="#1565a8"/>
  <text x="500" y="634" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">ClimateWatch Environment Server  —  app/main.py</text>

  <!-- Endpoint row -->
  <rect x="80"  y="652" width="110" height="24" rx="5" fill="#e8f5ee" stroke="#2e9e58" stroke-width="1.2"/>
  <text x="135" y="668" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1a7a40">POST /reset</text>

  <rect x="202" y="652" width="105" height="24" rx="5" fill="#e8f5ee" stroke="#2e9e58" stroke-width="1.2"/>
  <text x="254" y="668" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1a7a40">POST /step</text>

  <rect x="319" y="652" width="105" height="24" rx="5" fill="#dce8f8" stroke="#1565a8" stroke-width="1.2"/>
  <text x="371" y="668" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1565a8">GET /state</text>

  <rect x="436" y="652" width="105" height="24" rx="5" fill="#dce8f8" stroke="#1565a8" stroke-width="1.2"/>
  <text x="488" y="668" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1565a8">GET /health</text>

  <rect x="553" y="652" width="105" height="24" rx="5" fill="#dce8f8" stroke="#1565a8" stroke-width="1.2"/>
  <text x="605" y="668" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1565a8">GET /tasks</text>

  <rect x="670" y="652" width="110" height="24" rx="5" fill="#fdebd0" stroke="#b45d00" stroke-width="1.2"/>
  <text x="725" y="668" text-anchor="middle" font-size="9.5" font-weight="700" fill="#b45d00">POST /grader</text>

  <rect x="792" y="652" width="130" height="24" rx="5" fill="#fdebd0" stroke="#b45d00" stroke-width="1.2"/>
  <text x="857" y="668" text-anchor="middle" font-size="9.5" font-weight="700" fill="#b45d00">POST /baseline</text>

  <!-- Reward rules -->
  <text x="500" y="698" text-anchor="middle" font-size="9.5" fill="#374151">Reward: partial credit per step  ·  anti-loop penalty −0.30  ·  always clamped to [0.0, 1.0]</text>
  <text x="500" y="714" text-anchor="middle" font-size="9.5" fill="#374151">Episode: max 5 steps  ·  early stop at score ≥ 0.80  ·  thread-safe (RLock)</text>

  <!-- Arrows Server → Clients -->
  <line x1="200" y1="724" x2="160" y2="784" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="724" x2="500" y2="784" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="724" x2="840" y2="784" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════════════════
       LAYER 5 — CLIENTS
  ══════════════════════════════════════════════════════════ -->
  <text x="20" y="779" font-size="10" font-weight="700" fill="#6b7280" letter-spacing="1.5">LAYER 5 — CLIENTS</text>
  <line x1="20" y1="783" x2="980" y2="783" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Client 1: Judges -->
  <rect x="30" y="793" width="280" height="88" rx="8" fill="#ffffff" stroke="#c0323e" stroke-width="2"/>
  <rect x="30" y="793" width="280" height="26" rx="8" fill="#c0323e"/>
  <rect x="30" y="807" width="280" height="12" fill="#c0323e"/>
  <text x="170" y="810" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Evaluation Agent (Judges)</text>
  <text x="170" y="834" text-anchor="middle" font-size="9.5" fill="#374151">Calls /reset · /step · /grader</text>
  <text x="170" y="848" text-anchor="middle" font-size="9.5" fill="#374151">Nemotron 3 Super or GPT-4</text>
  <text x="170" y="864" text-anchor="middle" font-size="9" fill="#6b7280">Phase 2: Automated agentic evaluation</text>
  <text x="170" y="876" text-anchor="middle" font-size="9" fill="#6b7280">Checks score variance across episodes</text>

  <!-- Client 2: Dashboard -->
  <rect x="360" y="793" width="280" height="88" rx="8" fill="#ffffff" stroke="#2e9e58" stroke-width="2"/>
  <rect x="360" y="793" width="280" height="26" rx="8" fill="#2e9e58"/>
  <rect x="360" y="807" width="280" height="12" fill="#2e9e58"/>
  <text x="500" y="810" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Web Dashboard  (GET /)</text>
  <text x="500" y="834" text-anchor="middle" font-size="9.5" fill="#374151">Live sensor data tables with real values</text>
  <text x="500" y="848" text-anchor="middle" font-size="9.5" fill="#374151">Dependency graph · compliance status</text>
  <text x="500" y="864" text-anchor="middle" font-size="9" fill="#6b7280">Real-time episode score meters</text>
  <text x="500" y="876" text-anchor="middle" font-size="9" fill="#6b7280">White professional theme · no emojis</text>

  <!-- Client 3: inference.py -->
  <rect x="690" y="793" width="280" height="88" rx="8" fill="#ffffff" stroke="#7a3a9a" stroke-width="2"/>
  <rect x="690" y="793" width="280" height="26" rx="8" fill="#7a3a9a"/>
  <rect x="690" y="807" width="280" height="12" fill="#7a3a9a"/>
  <text x="830" y="810" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">inference.py  (Baseline Agent)</text>
  <text x="830" y="834" text-anchor="middle" font-size="9.5" fill="#374151">OpenAI client → HF Router (free)</text>
  <text x="830" y="848" text-anchor="middle" font-size="9.5" fill="#374151">Llama-3.3-70B · temperature=0.0</text>
  <text x="830" y="864" text-anchor="middle" font-size="9" fill="#6b7280">Reproducible baseline scores</text>
  <text x="830" y="876" text-anchor="middle" font-size="9" fill="#6b7280">Runtime &lt; 20 minutes · all 3 tasks</text>

</svg>
