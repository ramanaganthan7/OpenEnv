  <text x="790" y="860" text-anchor="middle" font-size="10" fill="#374151">OpenAI client → HuggingFace Router</text>
  <text x="790" y="875" text-anchor="middle" font-size="10" fill="#374151">meta-llama/Llama-3.3-70B-Instruct</text>
  <text x="790" y="890" text-anchor="middle" font-size="10" fill="#374151">temperature=0.0 · reproducible scores</text>
