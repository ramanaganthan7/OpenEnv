<svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1100" height="720" fill="#f4f6f8" rx="12"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a7a40">ClimateWatch — System Architecture</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#4a6a4a">Real-world Environmental Sensor AI Environment · OpenEnv Hackathon</text>

  <!-- ─── Row 1: Data Sources ─── -->
  <!-- Box: Open-Meteo -->
  <rect x="30" y="85" width="200" height="80" rx="8" fill="#ffffff" stroke="#2e9e58" stroke-width="2"/>
  <rect x="30" y="85" width="200" height="28" rx="8" fill="#2e9e58"/>
  <rect x="30" y="101" width="200" height="12" fill="#2e9e58"/>
  <text x="130" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Open-Meteo API (CAMS/ECMWF)</text>
  <text x="130" y="128" text-anchor="middle" font-size="10" fill="#333">Real measured hourly readings</text>
  <text x="130" y="143" text-anchor="middle" font-size="10" fill="#333">PM2.5 · NO2 · O3 · SO2 · CO · CH4</text>
  <text x="130" y="158" text-anchor="middle" font-size="10" fill="#4a6a4a">20 global industrial locations</text>

  <!-- Box: EPA NAAQS -->
  <rect x="260" y="85" width="200" height="80" rx="8" fill="#ffffff" stroke="#1565a8" stroke-width="2"/>
  <rect x="260" y="85" width="200" height="28" rx="8" fill="#1565a8"/>
  <rect x="260" y="101" width="200" height="12" fill="#1565a8"/>
  <text x="360" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">EPA/WHO Standards</text>
  <text x="360" y="128" text-anchor="middle" font-size="10" fill="#333">NAAQS thresholds</text>
  <text x="360" y="143" text-anchor="middle" font-size="10" fill="#333">Regulatory limits per pollutant</text>
  <text x="360" y="158" text-anchor="middle" font-size="10" fill="#4a6a4a">CH4 · NOx · PM2.5 · SO2 · O3</text>

  <!-- Box: Real Locations -->
  <rect x="490" y="85" width="200" height="80" rx="8" fill="#ffffff" stroke="#b45d00" stroke-width="2"/>
  <rect x="490" y="85" width="200" height="28" rx="8" fill="#b45d00"/>
  <rect x="490" y="101" width="200" height="12" fill="#b45d00"/>
  <text x="590" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Real Industrial Sites</text>
  <text x="590" y="128" text-anchor="middle" font-size="10" fill="#333">Houston TX · Delhi NCR · Jubail</text>
  <text x="590" y="143" text-anchor="middle" font-size="10" fill="#333">North Sea · Beijing · Chennai</text>
  <text x="590" y="158" text-anchor="middle" font-size="10" fill="#4a6a4a">Ahmadi Kuwait · Svalbard · more</text>

  <!-- Box: Fetch Script -->
  <rect x="720" y="85" width="200" height="80" rx="8" fill="#ffffff" stroke="#7a3a9a" stroke-width="2"/>
  <rect x="720" y="85" width="200" height="28" rx="8" fill="#7a3a9a"/>
  <rect x="720" y="101" width="200" height="12" fill="#7a3a9a"/>
  <text x="820" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">scripts/fetch_real_data.py</text>
  <text x="820" y="128" text-anchor="middle" font-size="10" fill="#333">Pre-fetches and caches real data</text>
  <text x="820" y="143" text-anchor="middle" font-size="10" fill="#333">Committed to repo (deterministic)</text>
  <text x="820" y="158" text-anchor="middle" font-size="10" fill="#4a6a4a">No runtime API calls</text>

  <!-- Arrows Row 1 -> Row 2 -->
  <line x1="130" y1="165" x2="440" y2="225" stroke="#2e9e58" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="360" y1="165" x2="470" y2="225" stroke="#1565a8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="590" y1="165" x2="520" y2="225" stroke="#b45d00" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="820" y1="165" x2="560" y2="225" stroke="#7a3a9a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ─── Row 2: Data Layer ─── -->
  <rect x="300" y="225" width="500" height="70" rx="8" fill="#ffffff" stroke="#1a7a40" stroke-width="2.5"/>
  <rect x="300" y="225" width="500" height="26" rx="8" fill="#1a7a40"/>
  <rect x="300" y="239" width="500" height="12" fill="#1a7a40"/>
  <text x="550" y="242" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">app/data/  —  Real Sensor Data Cache (JSON)</text>
  <text x="550" y="268" text-anchor="middle" font-size="10" fill="#333">real_task1.json · 20 scenarios · 24hr PM2.5/NO2/O3/SO2/CO/CH4 real readings</text>
  <text x="550" y="283" text-anchor="middle" font-size="10" fill="#333">real_task2.json · 10 networks · 7-day multi-sensor daily means</text>
  <text x="550" y="298" text-anchor="middle" font-size="9" fill="#4a6a4a">real_task3.json · 5 cascade networks · 30-day sensor status timelines</text>

  <!-- Arrow Row 2 -> Row 3 -->
  <line x1="550" y1="295" x2="550" y2="330" stroke="#1a7a40" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── Row 3: Task Engine ─── -->
  <text x="550" y="348" text-anchor="middle" font-size="11" font-weight="700" fill="#1a7a40">FAULT INJECTION ENGINE — Deterministic, Seeded (seed % n_scenarios)</text>

  <!-- Task 1 -->
  <rect x="30" y="358" width="300" height="95" rx="8" fill="#ffffff" stroke="#2e9e58" stroke-width="2"/>
  <rect x="30" y="358" width="300" height="24" rx="8" fill="#2e9e58"/>
  <rect x="30" y="370" width="300" height="12" fill="#2e9e58"/>
  <text x="180" y="374" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Task 1 — Single Sensor Detect [EASY]</text>
  <text x="180" y="397" text-anchor="middle" font-size="9.5" fill="#333">Real 24hr readings + fault injection</text>
  <text x="180" y="411" text-anchor="middle" font-size="9.5" fill="#333">Faults: outlier · stuck · missing · drift · spike · bias</text>
  <text x="180" y="425" text-anchor="middle" font-size="9.5" fill="#333">Grader: F1 score + calibration bonus</text>
  <text x="180" y="440" text-anchor="middle" font-size="9" fill="#4a6a4a">20 real-world scenarios · 20 industrial locations</text>

  <!-- Task 2 -->
  <rect x="390" y="358" width="320" height="95" rx="8" fill="#ffffff" stroke="#b45d00" stroke-width="2"/>
  <rect x="390" y="358" width="320" height="24" rx="8" fill="#b45d00"/>
  <rect x="390" y="370" width="320" height="12" fill="#b45d00"/>
  <text x="550" y="374" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Task 2 — Multi-Sensor Clean [MEDIUM]</text>
  <text x="550" y="397" text-anchor="middle" font-size="9.5" fill="#333">Real 7-day data · 5 sensors with different faults</text>
  <text x="550" y="411" text-anchor="middle" font-size="9.5" fill="#333">Agent diagnoses fault + recommends fix</text>
  <text x="550" y="425" text-anchor="middle" font-size="9.5" fill="#333">Grader: 60% fault type + 40% fix accuracy</text>
  <text x="550" y="440" text-anchor="middle" font-size="9" fill="#4a6a4a">10 real network scenarios</text>

  <!-- Task 3 -->
  <rect x="770" y="358" width="300" height="95" rx="8" fill="#ffffff" stroke="#c0323e" stroke-width="2"/>
  <rect x="770" y="358" width="300" height="24" rx="8" fill="#c0323e"/>
  <rect x="770" y="370" width="300" height="12" fill="#c0323e"/>
  <text x="920" y="374" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Task 3 — Cascade Failure [HARD]</text>
  <text x="920" y="397" text-anchor="middle" font-size="9.5" fill="#333">Real 30-day data · 10-sensor network</text>
  <text x="920" y="411" text-anchor="middle" font-size="9.5" fill="#333">Root cause · repair order · compliance</text>
  <text x="920" y="425" text-anchor="middle" font-size="9.5" fill="#333">Grader: 4-component weighted score</text>
  <text x="920" y="440" text-anchor="middle" font-size="9" fill="#4a6a4a">5 cascade network scenarios · EPA thresholds</text>

  <!-- Arrows Tasks -> API -->
  <line x1="180" y1="453" x2="400" y2="500" stroke="#2e9e58" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="453" x2="550" y2="500" stroke="#b45d00" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="920" y1="453" x2="700" y2="500" stroke="#c0323e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── Row 4: FastAPI Server ─── -->
  <rect x="280" y="500" width="540" height="95" rx="8" fill="#ffffff" stroke="#1565a8" stroke-width="2.5"/>
  <rect x="280" y="500" width="540" height="26" rx="8" fill="#1565a8"/>
  <rect x="280" y="514" width="540" height="12" fill="#1565a8"/>
  <text x="550" y="518" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">ClimateWatch FastAPI Server (app/main.py) · Port 7860</text>
  <!-- Endpoint pills -->
  <rect x="295" y="533" width="90" height="18" rx="4" fill="#e8f5ee" stroke="#2e9e58" stroke-width="1"/>
  <text x="340" y="545" text-anchor="middle" font-size="9" fill="#1a7a40" font-weight="600">POST /reset</text>
  <rect x="393" y="533" width="80" height="18" rx="4" fill="#e8f5ee" stroke="#2e9e58" stroke-width="1"/>
  <text x="433" y="545" text-anchor="middle" font-size="9" fill="#1a7a40" font-weight="600">POST /step</text>
  <rect x="481" y="533" width="75" height="18" rx="4" fill="#dce8f8" stroke="#1565a8" stroke-width="1"/>
  <text x="518" y="545" text-anchor="middle" font-size="9" fill="#1565a8" font-weight="600">GET /state</text>
  <rect x="564" y="533" width="75" height="18" rx="4" fill="#dce8f8" stroke="#1565a8" stroke-width="1"/>
  <text x="601" y="545" text-anchor="middle" font-size="9" fill="#1565a8" font-weight="600">GET /health</text>
  <rect x="647" y="533" width="75" height="18" rx="4" fill="#dce8f8" stroke="#1565a8" stroke-width="1"/>
  <text x="684" y="545" text-anchor="middle" font-size="9" fill="#1565a8" font-weight="600">GET /tasks</text>
  <rect x="730" y="533" width="80" height="18" rx="4" fill="#fdebd0" stroke="#b45d00" stroke-width="1"/>
  <text x="770" y="545" text-anchor="middle" font-size="9" fill="#b45d00" font-weight="600">POST /grader</text>

  <text x="550" y="572" text-anchor="middle" font-size="9.5" fill="#333">Reward: partial credit · anti-loop penalty (-0.30) · regression penalty (-0.05) · always [0.0, 1.0]</text>
  <text x="550" y="585" text-anchor="middle" font-size="9.5" fill="#333">Episode: max 5 steps · early stop at score ≥ 0.80 · thread-safe (RLock)</text>

  <!-- Arrow Server -> Clients -->
  <line x1="400" y1="595" x2="220" y2="640" stroke="#1565a8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="595" x2="550" y2="640" stroke="#1565a8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="595" x2="870" y2="640" stroke="#1565a8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── Row 5: Clients ─── -->
  <!-- Hackathon Judges -->
  <rect x="60" y="638" width="230" height="65" rx="8" fill="#ffffff" stroke="#c0323e" stroke-width="2"/>
  <rect x="60" y="638" width="230" height="22" rx="8" fill="#c0323e"/>
  <rect x="60" y="648" width="230" height="12" fill="#c0323e"/>
  <text x="175" y="652" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">Hackathon Judges (Nemotron)</text>
  <text x="175" y="672" text-anchor="middle" font-size="9" fill="#333">Call /reset · /step · /grader</text>
  <text x="175" y="685" text-anchor="middle" font-size="9" fill="#333">Bring their own LLM agent</text>
  <text x="175" y="698" text-anchor="middle" font-size="9" fill="#4a6a4a">Phase 2: Agentic evaluation</text>

  <!-- Dashboard -->
  <rect x="420" y="638" width="260" height="65" rx="8" fill="#ffffff" stroke="#2e9e58" stroke-width="2"/>
  <rect x="420" y="638" width="260" height="22" rx="8" fill="#2e9e58"/>
  <rect x="420" y="648" width="260" height="12" fill="#2e9e58"/>
  <text x="550" y="652" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">Web Dashboard (GET /)</text>
  <text x="550" y="672" text-anchor="middle" font-size="9" fill="#333">Live sensor data tables · inline bar charts</text>
  <text x="550" y="685" text-anchor="middle" font-size="9" fill="#333">Dependency graph · compliance status</text>
  <text x="550" y="698" text-anchor="middle" font-size="9" fill="#4a6a4a">Real-time episode score meters</text>

  <!-- Baseline inference -->
  <rect x="800" y="638" width="270" height="65" rx="8" fill="#ffffff" stroke="#7a3a9a" stroke-width="2"/>
  <rect x="800" y="638" width="270" height="22" rx="8" fill="#7a3a9a"/>
  <rect x="800" y="648" width="270" height="12" fill="#7a3a9a"/>
  <text x="935" y="652" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">inference.py Baseline Agent</text>
  <text x="935" y="672" text-anchor="middle" font-size="9" fill="#333">OpenAI client → HF Router (free)</text>
  <text x="935" y="685" text-anchor="middle" font-size="9" fill="#333">meta-llama/Llama-3.3-70B-Instruct</text>
  <text x="935" y="698" text-anchor="middle" font-size="9" fill="#4a6a4a">Temp=0.0 · deterministic scores</text>

  <!-- Legend -->
  <rect x="30" y="625" width="12" height="12" fill="#2e9e58" rx="2"/>
  <text x="47" y="635" font-size="9" fill="#333">Real data / Environment</text>
  <rect x="140" y="625" width="12" height="12" fill="#1565a8" rx="2"/>
  <text x="157" y="635" font-size="9" fill="#333">API endpoints</text>
  <rect x="235" y="625" width="12" height="12" fill="#c0323e" rx="2"/>
  <text x="252" y="635" font-size="9" fill="#333">Clients / Agents</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>
</svg>
