  <rect x="30" y="402" width="280" height="28" rx="7" fill="#2e9e58"/>
  <rect x="30" y="418" width="280" height="12" fill="#2e9e58"/>
  <text x="170" y="421" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">
