  <text x="480" y="320" text-anchor="middle" font-size="9"  fill="#6b7280">~32 KB</text>

  <!-- real_task3.json -->
  <rect x="650" y="240" width="280" height="86" rx="7" fill="#ffffff" stroke="#c0323e" stroke-width="1.5"/>
