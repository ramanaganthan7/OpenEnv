  <rect x="690" y="658" width="118" height="22" rx="5" fill="#fdebd0" stroke="#b45d00" stroke-width="1.2"/>
  <text x="749" y="673" text-anchor="middle" font-size="9.5" font-weight="700" fill="#b45d00">POST  /grader</text>

  <rect x="818" y="658" width="102" height="22" rx="5" fill="#fdebd0" stroke="#b45d00" stroke-width="1.2"/>
  <text x="869" y="673" text-anchor="middle" font-size="9.5" font-weight="700" fill="#b45d00">POST  /baseline</text>

  <!-- Reward rules -->
  <text x="480" y="703" text-anchor="middle" font-size="9.5" fill="#374151">
    Reward per step  ·  partial credit  ·  anti-loop penalty -0.30  ·  always clamped to [0.0, 1.0]
  </text>
  <text x="480" y="720" text-anchor="middle" font-size="9.5" fill="#374151">
    Max 5 steps per episode  ·  early stop at score >= 0.80  ·  thread-safe (RLock)
  </text>
  <text x="480" y="730" text-anchor="middle" font-size="9" fill="#6b7280">
    Interactive dashboard at GET /  ·  Swagger UI at GET /docs
  </text>

