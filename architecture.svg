  </text>
  <text x="170" y="510" text-anchor="middle" font-size="9" fill="#6b7280">
    20 scenarios  ·  seed % 20
  </text>
  <text x="170" y="526" text-anchor="middle" font-size="9" fill="#6b7280">
    Score: 0.0 – 1.0
  </text>

