<svg viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e9e58"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565a8"/>
    </marker>
  </defs>

  <!-- Page background -->
  <rect width="1000" height="900" fill="#f8fafc" rx="0"/>

  <!-- ══════════════════════════════════════════════════════════
       TITLE
  ══════════════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="1000" height="58" fill="#1a7a40"/>
  <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">ClimateWatch — System Architecture</text>
  <text x="500" y="47" text-anchor="middle" font-size="11" fill="#a8d8b8">Environmental Sensor AI Environment · OpenEnv Specification</text>

  <!-- ══════════════════════════════════════════════════════════
       LAYER 1 — DATA SOURCE
  ══════════════════════════════════════════════════════════ -->
  <text x="20" y="88" font-size="10" font-weight="700" fill="#6b7280" letter-spacing="1.5">LAYER 1 — REAL DATA SOURCE</text>
  <line x1="20" y1="92" x2="980" y2="92" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="60" y="102" width="380" height="90" rx="8" fill="#ffffff" stroke="#2e9e58" stroke-width="2"/>
  <rect x="60" y="102" width="380" height="30" rx="8" fill="#2e9e58"/>
  <rect x="60" y="120" width="380" height="12" fill="#2e9e58"/>
  <text x="250" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Open-Meteo Air Quality API</text>
  <text x="250" y="148" text-anchor="middle" font-size="10" fill="#374151">CAMS / ECMWF — European Centre for Medium-Range Weather Forecasts</text>
  <text x="250" y="163" text-anchor="middle" font-size="10" fill="#374151">Hourly measured readings · No API key required · Free</text>
  <text x="250" y="178" text-anchor="middle" font-size="9.5" fill="#2e9e58">PM2.5 · NO2 · O3 · SO2 · CO · CH4</text>

  <rect x="560" y="102" width="380" height="90" rx="8" fill="#ffffff" stroke="#1565a8" stroke-width="2"/>
  <rect x="560" y="102" width="380" height="30" rx="8" fill="#1565a8"/>
  <rect x="560" y="120" width="380" height="12" fill="#1565a8"/>
  <text x="750" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Real Industrial Monitoring Locations</text>
  <text x="750" y="148" text-anchor="middle" font-size="10" fill="#374151">Houston TX · Delhi NCR · North Sea · Jubail Saudi Arabia</text>
  <text x="750" y="163" text-anchor="middle" font-size="10" fill="#374151">Beijing · Chennai · Svalbard · Manaus · Essen · Guangzhou</text>
  <text x="750" y="178" text-anchor="middle" font-size="9.5" fill="#1565a8">20 locations for Task 1 · 10 networks for Task 2 · 5 for Task 3</text>

  <!-- Arrow: Data Source → fetch script -->
  <line x1="500" y1="147" x2="500" y2="218" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <rect x="395" y="193" width="210" height="20" rx="4" fill="#f1f5f9"/>
  <text x="500" y="207" text-anchor="middle" font-size="9" fill="#6b7280">scripts/fetch_real_data.py · run once · committed to repo</text>

  <!-- ══════════════════════════════════════════════════════════
       LAYER 2 — DATA CACHE
  ══════════════════════════════════════════════════════════ -->
  <text x="20" y="243" font-size="10" font-weight="700" fill="#6b7280" letter-spacing="1.5">LAYER 2 — CACHED REAL DATA  (app/data/)</text>
  <line x1="20" y1="247" x2="980" y2="247" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="60" y="257" width="270" height="80" rx="8" fill="#ffffff" stroke="#2e9e58" stroke-width="1.5"/>
  <rect x="60" y="257" width="270" height="26" rx="8" fill="#e8f5ee"/>
  <rect x="60" y="271" width="270" height="12" fill="#e8f5ee"/>
  <text x="195" y="274" text-anchor="middle" font-size="10" font-weight="700" fill="#1a7a40">real_task1.json</text>
  <text x="195" y="297" text-anchor="middle" font-size="9.5" fill="#374151">20 scenarios · 24-hour readings</text>
  <text x="195" y="311" text-anchor="middle" font-size="9.5" fill="#374151">PM2.5 / NO2 / O3 / SO2 / CO / CH4</text>
  <text x="195" y="327" text-anchor="middle" font-size="9" fill="#6b7280">20 global industrial locations</text>

  <rect x="365" y="257" width="270" height="80" rx="8" fill="#ffffff" stroke="#b45d00" stroke-width="1.5"/>
  <rect x="365" y="257" width="270" height="26" rx="8" fill="#fef3e8"/>
  <rect x="365" y="271" width="270" height="12" fill="#fef3e8"/>
  <text x="500" y="274" text-anchor="middle" font-size="10" font-weight="700" fill="#b45d00">real_task2.json</text>
  <text x="500" y="297" text-anchor="middle" font-size="9.5" fill="#374151">10 network scenarios · 7-day data</text>
  <text x="500" y="311" text-anchor="middle" font-size="9.5" fill="#374151">5 sensors · daily means per sensor</text>
  <text x="500" y="327" text-anchor="middle" font-size="9" fill="#6b7280">10 industrial network locations</text>

  <rect x="670" y="257" width="270" height="80" rx="8" fill="#ffffff" stroke="#c0323e" stroke-width="1.5"/>
  <rect x="670" y="257" width="270" height="26" rx="8" fill="#fef0f0"/>
  <rect x="670" y="271" width="270" height="12" fill="#fef0f0"/>
  <text x="805" y="274" text-anchor="middle" font-size="10" font-weight="700" fill="#c0323e">real_task3.json</text>
  <text x="805" y="297" text-anchor="middle" font-size="9.5" fill="#374151">5 cascade networks · 30-day data</text>
  <text x="805" y="311" text-anchor="middle" font-size="9.5" fill="#374151">10 sensors · daily status timelines</text>
  <text x="805" y="327" text-anchor="middle" font-size="9" fill="#6b7280">Kuwait · Texas · Beijing · Chennai · North Sea</text>

  <!-- Arrows: Cache → Tasks -->
  <line x1="195" y1="337" x2="195" y2="397" stroke="#2e9e58" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="500" y1="337" x2="500" y2="397" stroke="#b45d00" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="805" y1="337" x2="805" y2="397" stroke="#c0323e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════════════════
       LAYER 3 — TASK ENGINE
  ══════════════════════════════════════════════════════════ -->
  <text x="20" y="392" font-size="10" font-weight="700" fill="#6b7280" letter-spacing="1.5">LAYER 3 — FAULT INJECTION ENGINE  (deterministic · seeded)</text>
  <line x1="20" y1="396" x2="980" y2="396" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Task 1 -->
  <rect x="30" y="406" width="290" height="120" rx="8" fill="#ffffff" stroke="#2e9e58" stroke-width="2"/>
  <rect x="30" y="406" width="290" height="30" rx="8" fill="#2e9e58"/>
  <rect x="30" y="424" width="290" height="12" fill="#2e9e58"/>
  <text x="175" y="426" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Task 1 · Single Sensor Detect</text>
  <rect x="296" y="409" width="44" height="18" rx="4" fill="#d4f0df"/>
  <text x="318" y="421" text-anchor="middle" font-size="9" font-weight="700" fill="#1a7a40">EASY</text>
  <text x="175" y="454" text-anchor="middle" font-size="9.5" fill="#374151">Real 24-hr baseline + fault injection</text>
  <text x="175" y="468" text-anchor="middle" font-size="9.5" fill="#374151">outlier · stuck · missing · drift · spike · bias</text>
  <text x="175" y="484" text-anchor="middle" font-size="9.5" fill="#374151">Grader: F1 score + calibration bonus</text>
  <text x="175" y="500" text-anchor="middle" font-size="9.5" fill="#374151">20 scenarios · deterministic by seed</text>
  <text x="175" y="518" text-anchor="middle" font-size="9" fill="#6b7280">Score range: 0.0 – 1.0</text>

  <!-- Task 2 -->
  <rect x="355" y="406" width="290" height="120" rx="8" fill="#ffffff" stroke="#b45d00" stroke-width="2"/>
  <rect x="355" y="406" width="290" height="30" rx="8" fill="#b45d00"/>
  <rect x="355" y="424" width="290" height="12" fill="#b45d00"/>
  <text x="500" y="426" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Task 2 · Multi-Sensor Cleaning</text>
  <rect x="617" y="409" width="52" height="18" rx="4" fill="#fdebd0"/>
  <text x="643" y="421" text-anchor="middle" font-size="9" font-weight="700" fill="#b45d00">MEDIUM</text>
  <text x="500" y="454" text-anchor="middle" font-size="9.5" fill="#374151">Real 7-day baseline · 5 sensors / network</text>
  <text x="500" y="468" text-anchor="middle" font-size="9.5" fill="#374151">drift · bias · noise · missing · stuck</text>
  <text x="500" y="484" text-anchor="middle" font-size="9.5" fill="#374151">Grader: 60% fault + 40% fix accuracy</text>
  <text x="500" y="500" text-anchor="middle" font-size="9.5" fill="#374151">10 network scenarios</text>
  <text x="500" y="518" text-anchor="middle" font-size="9" fill="#6b7280">Score range: 0.0 – 1.0</text>

  <!-- Task 3 -->
  <rect x="680" y="406" width="290" height="120" rx="8" fill="#ffffff" stroke="#c0323e" stroke-width="2"/>
  <rect x="680" y="406" width="290" height="30" rx="8" fill="#c0323e"/>
  <rect x="680" y="424" width="290" height="12" fill="#c0323e"/>
  <text x="825" y="426" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Task 3 · Cascade Failure Audit</text>
  <rect x="938" y="409" width="44" height="18" rx="4" fill="#fad4d8"/>
  <text x="960" y="421" text-anchor="middle" font-size="9" font-weight="700" fill="#c0323e">HARD</text>
  <text x="825" y="454" text-anchor="middle" font-size="9.5" fill="#374151">Real 30-day baseline · 10-sensor network</text>
  <text x="825" y="468" text-anchor="middle" font-size="9.5" fill="#374151">Reference outage → dependent corruption</text>
  <text x="825" y="484" text-anchor="middle" font-size="9.5" fill="#374151">Root cause · repair order · EPA compliance</text>
  <text x="825" y="500" text-anchor="middle" font-size="9.5" fill="#374151">4-component grader · 5 cascade scenarios</text>
  <text x="825" y="518" text-anchor="middle" font-size="9" fill="#6b7280">Score range: 0.0 – 1.0</text>

  <!-- Arrows Tasks → Server -->
  <line x1="175" y1="526" x2="380" y2="610" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="526" x2="500" y2="610" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="825" y1="526" x2="620" y2="610" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

