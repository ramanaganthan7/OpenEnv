  <text x="237" y="673" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1a7a40">POST  /step</text>

  <rect x="306" y="658" width="118" height="22" rx="5" fill="#dce8f8" stroke="#1565a8" stroke-width="1.2"/>
